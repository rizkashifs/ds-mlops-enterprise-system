# Inference (scoring) pipeline configuration.

model:
  registry_name: "churn-rf"
  stage: "Production"          # MLflow stage: Production, Staging, Archived
  # Alternatively, pin to a specific URI:
  # uri: "runs:/abc123/model"

scoring:
  mode: batch                  # batch | online
  batch_output_path: "outputs/scores/"  # Override with MLOPS_SCORING_OUTPUT_PATH
  output_columns:
    - prediction
    - probability

data:
  contract: churn_features_v1
  contract_version: "1.0"
  exclude_columns:
    - target                   # Drop label column before scoring

monitoring:
  log_score_distribution: true
  psi_baseline_path: "artifacts/psi_baseline.parquet"
  psi_alert_threshold: 0.20

# Retraining trigger thresholds.
# These feed directly into TriggerConfig in mlops_platform/monitoring_hooks/triggers.py.
# See docs/retraining_triggers.md for guidance on setting these per use case.
retraining:
  triggers:
    psi_warn_threshold: 0.10       # schedule investigation
    psi_alert_threshold: 0.20      # trigger immediate retrain
    score_shift_threshold: 0.10    # relative shift in mean score
    performance_drop_threshold: 0.05  # absolute pp drop from validation baseline
    max_days_since_retrain: 60     # time-based safety net
    min_records_for_drift_check: 500
